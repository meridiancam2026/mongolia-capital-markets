services:
  - type: web
    name: mongolia-api
    runtime: python
    buildCommand: pip install -r requirements-prod.txt && alembic -c backend/alembic.ini upgrade head
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mongolia-db
          property: connectionString
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: CORS_ORIGINS
        sync: false
      - key: GITHUB_TOKEN
        sync: false

databases:
  - name: mongolia-db
    databaseName: mongolia
    user: mongolia_user
    plan: free
