services:
  - type: web
    name: mongolia-api
    runtime: python
    buildCommand: pip install -r requirements-prod.txt && PLAYWRIGHT_BROWSERS_PATH=/opt/render/project/src/.playwright playwright install chromium --with-deps && alembic -c backend/alembic.ini upgrade head
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mongolia-db
          property: connectionString
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: CORS_ORIGINS
        sync: false
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /opt/render/project/src/.playwright

  - type: cron
    name: mongolia-cbonds-ingest
    runtime: python
    # 23:00 UTC = 07:00 Ulaanbaatar time (UTC+8)
    schedule: "0 23 * * *"
    buildCommand: pip install -r requirements-prod.txt
    startCommand: python scripts/ingest_cbonds.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mongolia-db
          property: connectionString
      - key: CBONDS_SESSION_B64
        sync: false
      - key: CBONDS_USERNAME
        sync: false
      - key: CBONDS_PASSWORD
        sync: false
      - key: LOG_LEVEL
        value: INFO

databases:
  - name: mongolia-db
    databaseName: mongolia
    user: mongolia_user
    plan: free
